version: 1
applications:
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - sed -i "s|__API_URL__|$NG_APP_API_URL|g" src/assets/env.js
            - npm run build
      artifacts:
        baseDirectory: dist/frontend/browser
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
